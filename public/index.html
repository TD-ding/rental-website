<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好租 - 找到理想的家</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">🏠 好租</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="#" id="fav-link">我的收藏</a>
        <a href="login.html">管理登录</a>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="container">
      <h1>找到你的理想居所</h1>
      <p>海量优质房源，轻松租房</p>
      <div class="hero-stats">
        <div class="stat-item">
          <span class="stat-num" id="hero-count">--</span>
          <span class="stat-label">在租房源</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">9</span>
          <span class="stat-label">覆盖城市</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">0</span>
          <span class="stat-label">中介费</span>
        </div>
      </div>
    </div>
  </header>

  <section class="search-section" id="search-section">
    <div class="container">
      <form id="search-form" class="search-bar">
        <input type="text" id="s-keyword" placeholder="搜索关键词（小区名、地址...）">
        <input type="number" id="s-min" placeholder="最低价格" min="0">
        <span class="divider">—</span>
        <input type="number" id="s-max" placeholder="最高价格" min="0">
        <select id="s-layout">
          <option value="">全部户型</option>
          <option>开间</option><option>1室0厅</option><option>1室1厅</option>
          <option>2室1厅</option><option>2室2厅</option><option>3室1厅</option>
          <option>3室2厅</option><option>4室2厅</option>
        </select>
        <select id="s-sort">
          <option value="newest">最新发布</option>
          <option value="price_asc">价格从低到高</option>
          <option value="price_desc">价格从高到低</option>
        </select>
        <button type="submit" class="btn btn-primary">搜索</button>
      </form>
    </div>
  </section>

  <main class="container" id="results-section">
    <div class="section-header">
      <h2 id="result-title">全部房源</h2>
      <span id="result-count" class="badge"></span>
    </div>
    <div id="house-list" class="house-grid"></div>
    <div id="empty-state" class="empty-state" style="display:none;">
      <p>😔 没有找到匹配的房源，试试调整搜索条件</p>
    </div>
  </main>

  <div id="fav-panel" class="fav-panel" style="display:none;">
    <div class="fav-panel-header">
      <h3>我的收藏 <span id="fav-count" class="badge">0</span></h3>
      <button class="btn btn-sm btn-secondary" id="fav-close">收起</button>
    </div>
    <div id="fav-list" class="house-grid"></div>
    <div id="fav-empty" class="empty-state" style="display:none;">
      <p>还没有收藏房源，点击房源卡片上的 ♡ 添加收藏</p>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 好租 HaoZu - 找到理想的家</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
