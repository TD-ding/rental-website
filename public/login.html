<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理登录 - 好租</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">🏠 好租</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
      </div>
    </div>
  </nav>

  <main class="container login-page">
    <div class="login-card">
      <h1>管理员登录</h1>
      <p class="hint">登录后可管理房源和预约</p>
      <form id="login-form" class="form-card">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="l-username" required placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="l-password" required placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>
      <div id="login-msg" class="msg" style="display:none;"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 好租 HaoZu</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
