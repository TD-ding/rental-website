<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 好租</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">🏠 好租</a>
      <div class="nav-links">
        <a href="index.html">前台首页</a>
        <a href="#" id="logout-btn">退出登录</a>
      </div>
    </div>
  </nav>

  <main class="container admin-page">
    <h1>管理后台</h1>

    <div class="tabs">
      <button class="tab-btn active" data-tab="houses">房源管理</button>
      <button class="tab-btn" data-tab="appointments">预约管理</button>
      <button class="tab-btn" data-tab="users">用户列表</button>
    </div>

    <!-- 房源管理 -->
    <section id="tab-houses" class="tab-content active">
      <button class="btn btn-primary" id="add-house-btn">+ 添加房源</button>
      <table class="data-table" id="houses-table">
        <thead>
          <tr><th>ID</th><th>标题</th><th>价格</th><th>户型</th><th>面积</th><th>操作</th></tr>
        </thead>
        <tbody></tbody>
      </table>

      <div id="house-modal" class="modal" style="display:none;">
        <div class="modal-content">
          <h2 id="modal-title">添加房源</h2>
          <form id="house-form" class="form-card">
            <input type="hidden" id="h-id">
            <div class="form-row">
              <div class="form-group"><label>标题</label><input type="text" id="h-title" required></div>
              <div class="form-group"><label>户型</label>
                <select id="h-layout" required>
                  <option>开间</option><option>1室0厅</option><option>1室1厅</option>
                  <option>2室1厅</option><option>2室2厅</option><option>3室1厅</option>
                  <option>3室2厅</option><option>4室2厅</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>月租价格（元）</label><input type="number" id="h-price" min="0" required></div>
              <div class="form-group"><label>面积（㎡）</label><input type="number" id="h-area" min="0" required></div>
            </div>
            <div class="form-group"><label>地址</label><input type="text" id="h-address" required></div>
            <div class="form-group"><label>房源描述</label><textarea id="h-desc" rows="3" required></textarea></div>
            <div class="form-row">
              <div class="form-group"><label>联系人</label><input type="text" id="h-contact" required></div>
              <div class="form-group"><label>联系电话</label><input type="tel" id="h-phone" required></div>
            </div>
            <div class="form-group"><label>图片URL（可选）</label><input type="text" id="h-image"></div>
            <div class="modal-actions">
              <button type="submit" class="btn btn-primary">保存</button>
              <button type="button" class="btn btn-secondary" id="cancel-house">取消</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- 预约管理 -->
    <section id="tab-appointments" class="tab-content">
      <table class="data-table" id="appointments-table">
        <thead>
          <tr><th>ID</th><th>房源</th><th>姓名</th><th>电话</th><th>日期</th><th>状态</th><th>操作</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- 用户列表 -->
    <section id="tab-users" class="tab-content">
      <table class="data-table" id="users-table">
        <thead>
          <tr><th>ID</th><th>用户名</th><th>角色</th><th>创建时间</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 好租 HaoZu</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
