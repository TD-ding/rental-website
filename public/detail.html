<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房源详情 - 好租</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">🏠 好租</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="login.html">管理登录</a>
      </div>
    </div>
  </nav>

  <main class="container detail-page">
    <a href="index.html" class="back-link">← 返回列表</a>
    <div id="detail-content">
      <p>加载中...</p>
    </div>

    <section class="appointment-section">
      <h2>预约看房</h2>
      <form id="appointment-form" class="form-card">
        <input type="hidden" id="a-house-id">
        <div class="form-group">
          <label>您的姓名</label>
          <input type="text" id="a-name" required>
        </div>
        <div class="form-group">
          <label>联系电话</label>
          <input type="tel" id="a-phone" required>
        </div>
        <div class="form-group">
          <label>期望看房日期</label>
          <input type="date" id="a-date" required>
        </div>
        <div class="form-group">
          <label>留言（可选）</label>
          <textarea id="a-message" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">提交预约</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 好租 HaoZu</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
